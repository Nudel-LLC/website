name: CI / CD

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}

  deploy-preview:
    name: Deploy PR Preview
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy preview
        id: deploy
        run: |
          WORKER_NAME="nudel-website-pr-${{ github.event.pull_request.number }}"
          SECRETS_JSON='{"MICROCMS_API_KEY":"'"$MICROCMS_API_KEY"'","RESEND_API_KEY":"'"$RESEND_API_KEY"'"}'

          # アカウントのサブドメインを取得してプレビューURLを構築
          SUBDOMAIN=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain')
          PREVIEW_URL="https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev"

          # シークレットを先に登録（Worker 未作成の場合は先にデプロイして作成）
          if ! echo "$SECRETS_JSON" | npx wrangler secret bulk --name "$WORKER_NAME" 2>/dev/null; then
            echo "Worker が未作成のため、先にデプロイして作成します..."
            npm run deploy:preview -- --name "$WORKER_NAME" --var "SITE_URL:${PREVIEW_URL}"
            echo "$SECRETS_JSON" | npx wrangler secret bulk --name "$WORKER_NAME"
          fi

          # シークレット登録済みの状態でデプロイ
          npm run deploy:preview -- --name "$WORKER_NAME" --var "SITE_URL:${PREVIEW_URL}"
          echo "url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - name: Comment preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-url
          message: |
            🚀 **PR プレビュー環境にデプロイしました**
            ${{ steps.deploy.outputs.url }}

  deploy-alpha:
    name: Deploy to Alpha
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: alpha
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run deploy:alpha
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}

  e2e-alpha:
    name: E2E Tests (Alpha)
    needs: [deploy-alpha]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Wait for deployment
        run: |
          for i in $(seq 1 30); do
            if curl -sf https://alpha.nudel.co.jp > /dev/null 2>&1; then
              echo "Alpha is ready"
              exit 0
            fi
            echo "Waiting for alpha... ($i/30)"
            sleep 10
          done
          echo "Alpha did not become ready in time"
          exit 1
      - name: Run E2E tests
        run: npx playwright test --ignore-snapshots --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: https://alpha.nudel.co.jp
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy-prod:
    name: Deploy to Prod
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
